name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master  # Trigger workflow on pushes to the master branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'  # Specify the Node.js version

    - name: Install dependencies
      run: |
        npm install # Adjust if you use a package manager like yarn or don't need this

    - name: Build Project
      run: |
        npm run build # Adjust based on how your site is built

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist # Replace with the directory containing your built site
